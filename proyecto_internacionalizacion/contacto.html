<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="stylesheet" href="./assets/css/header.css">
    <link rel="stylesheet" href="./assets/css/footer.css">
    <link rel="stylesheet" href="./assets/css/ficha.css">
    <link rel="stylesheet" href="./assets/css/contacto.css">

</head>

<body>
    <header>

    </header>

    <main>
        <div class="contenedor_contacto">
            <form action="" id="contact_form">
                <h2>Contacto Internacionalizacion</h2>
                <p>Contactate Con El Equipo de Internacionalizacion de La UACJ Para Obtener Mas Informacion Sobre El
                    Programa Que Te Interese</p>

                <input type="text" id="user_name" name="name" placeholder="Tu Nombre" required>
                <input type="text" id="user_email" name="email" placeholder="Tu Correo" required>
                <input type="text" id="user_email" name="email" placeholder="Tu Correo" required>

                <select name="glass_type" id="glass_type">
                    <option value="francia"></option>
                    <option value="italia">Vidrio Laminado</option>
                    <option value="alemania">Vidrio Espejo</option>
                    <option value="colombia">Vidrio Doble Cristalizado</option>
                </select>

                <textarea name="message" id="message" placeholder="Detalles del pedido (medios, espesor....)"
                    required></textarea>

                <button type="submit" id="button">Envair COtizacion</button>
            </form>
        </div>
    </main>

    <footer>

    </footer>

    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/header.js"></script>
    <script src="./assets/js/footer.js"></script>
</body>

</html>
