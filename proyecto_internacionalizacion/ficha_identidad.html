                    <h2>Contacto Internacionalizacion</h2>
                    <p>Contactate Con El Equipo de Internacionalizacion de La UACJ Para Obtener Mas Informacion Sobre El

                    <input type="text" id="user_name" name="nombre" placeholder="Tu Nombre" required>
                    <input type="text" id="user_email" name="correo" placeholder="Tu Correo" required>
                    <input type="text" id="id_matricula" name="matricula" placeholder="Tu Matricula" required>
                    <input type="text" id="cantidad_de_creditos" name="creditos"
                        placeholder="Cantidad de Creditos Obtenidos" required>

                    <select name="programa" id="glass_type">
                        <option value="">-- Selecciona un programa --</option>
                        <option value="Programa Universidad De Paris">Programa Universidad De Paris</option>
                        <option value="Programa Universidad De Florencia">Programa Universidad De Florencia</option>
                        <option value="Programa Universidad Karlsruher Institut fur Technologie">Programa Universidad

                        <option value="Programa Universidad De Nuevo Mexico">Programa Universidad De Nuevo Mexico
                        </option>
                        <option value="Programa Universidad De Antioquia">Programa Universidad De Antioquia</option>
                    </select>

                    <select name="campus" id="nombre_carrera">
                        <option value="">-- Selecciona tu campus --</option>
                        <option value="IIT">IIT</option>
                        <option value="IADA">IADA</option>
                        <option value="ICB">ICB</option>
                        <option value="ICSA">ICSA</option>
                    </select>

                    <textarea name="mensaje" id="message" placeholder="Detalles de la consulta" required></textarea>

                    <button type="submit" id="button">Enviar</button>
                </form>
            </div>
