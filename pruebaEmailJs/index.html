<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <!--<script type="text/javascript" src="https://cdn.jsdeliver.net/npm/@emailjs/browser@3/dist/email.min.js"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <form action="" id="contact_form">
            <h2>Solicitud de Vidrios</h2>
            <p>envia Una COtizacion Rapida a Nuestro Equipo</p>

            <input type="text" id="user_name" name="name" placeholder="Tu Nombre" required>
            <input type="text" id="user_email" name="email" placeholder="Tu Correo" required>

            <select name="glass_type" id="glass_type">
                <option value="templado">Vidrio Templado</option>
                <option value="laminado">Vidrio Laminado</option>
                <option value="espejo">Vidrio Espejo</option>
                <option value="doble_cristalizado">Vidrio Doble Cristalizado</option>
            </select>

            <textarea name="message" id="message" placeholder="Detalles del pedido (medios, espesor....)" required></textarea>

            <button type="submit" id="button">Envair COtizacion</button>
        </form>
    </div>

    <script src="/script.js"></script>
</body>
</html>
